services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: pricedb
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
  redis:
    image: redis:alpine
  ml-service:
    build: ./ml-service
    depends_on:
      - redis
      - db
  scraper:
    build: ./scraper
    depends_on:
      - redis
  web-dashboard:
    build: ./web-dashboard
    ports:
      - "5000:5000"
    depends_on:
      - db

volumes:
  postgres_data: